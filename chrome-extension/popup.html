<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { width: 280px; background: #f8f8ff; }
    .header { background: #4f46e5; color: white; padding: 16px; text-align: center; }
    .header h1 { font-size: 18px; font-weight: 800; }
    .header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .content { padding: 16px; space-y: 12px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 12px; background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e5e7eb; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.gray  { background: #9ca3af; }
    .status-text { font-size: 13px; font-weight: 600; color: #374151; }
    .status-sub  { font-size: 11px; color: #9ca3af; margin-top: 1px; }
    .btn { display: block; width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; margin-top: 10px; }
    .btn:hover { background: #4338ca; }
    .info { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔗 ListSync</h1>
    <p>Chrome Extension</p>
  </div>
  <div class="content">
    <div class="status" id="status">
      <div class="dot gray" id="dot"></div>
      <div>
        <div class="status-text" id="statusText">Verbinde mit ListSync…</div>
        <div class="status-sub" id="statusSub">localhost:3000</div>
      </div>
    </div>
    <a href="http://localhost:3000" target="_blank" class="btn">ListSync öffnen →</a>
    <p class="info">Klicke in ListSync auf "Crossposten" und wähle Vinted oder Kleinanzeigen – die Extension füllt alles automatisch aus.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
