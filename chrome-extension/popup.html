<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { width: 300px; background: #f8f8ff; }
    .header { background: #4f46e5; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 800; }
    .header p  { font-size: 11px; opacity: 0.75; }
    .content { padding: 14px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e5e7eb; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: #9ca3af; }
    .dot.green { background: #22c55e; }
    .status-text { font-size: 13px; font-weight: 600; color: #374151; }
    .status-sub  { font-size: 11px; color: #9ca3af; margin-top: 1px; }
    .btn { display: block; width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 8px; }
    .btn:hover { background: #4338ca; }
    .section { margin-top: 10px; }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #9ca3af; margin-bottom: 6px; }
    .account-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: white; border-radius: 8px; border: 1.5px solid #e5e7eb; cursor: pointer; margin-bottom: 4px; }
    .account-item.active { border-color: #4f46e5; background: #eef2ff; }
    .account-name { font-size: 13px; font-weight: 600; color: #374151; flex: 1; }
    .account-item.active .account-name { color: #4f46e5; }
    .active-badge { font-size: 10px; font-weight: 700; color: #4f46e5; background: #c7d2fe; padding: 2px 6px; border-radius: 999px; }
    .add-account { display: flex; gap: 6px; margin-top: 6px; }
    .add-account input { flex: 1; padding: 7px 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 12px; }
    .add-account button { padding: 7px 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .del-btn { font-size: 11px; color: #ef4444; cursor: pointer; padding: 0 4px; border: none; background: none; line-height: 1; }
    .info { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 10px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div style="width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🔗</div>
    <div><h1>ListSync</h1><p>Chrome Extension</p></div>
  </div>
  <div class="content">
    <div class="status">
      <div class="dot" id="dot"></div>
      <div>
        <div class="status-text" id="statusText">Verbinde…</div>
        <div class="status-sub" id="statusSub">project-dle5b.vercel.app</div>
      </div>
    </div>

    <a href="https://project-dle5b.vercel.app" target="_blank" class="btn">ListSync öffnen →</a>

    <div class="section">
      <div class="section-title">Vinted Accounts</div>
      <div id="accountList"></div>
      <div class="add-account">
        <input id="newAccountName" placeholder="Account-Name (z.B. Haupt)" maxlength="30"/>
        <button id="addAccountBtn">+</button>
      </div>
    </div>

    <p class="info">Klicke in ListSync auf „Crossposten" und wähle Vinted – die Extension füllt alles mit dem aktiven Account aus.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
